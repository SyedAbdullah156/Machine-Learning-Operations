<!DOCTYPE html>
<html>
<head>
    <title>Flask MongoDB App</title>
</head>
<body>
    <h2>Student Pass or Fail Check</h2>

    <!-- IMPORTANT: method must be POST, and input names must match Flask code -->
    <form id="studentForm">
        <label>Study Time:</label>
        <input type="text" id="study_hours" name="study_hours" required>
        <br>
        <label>Sleep Time:</TIme>:</label>
        <input type="text" id="sleep_hours" name="sleep_hours" required>
        <br><br>
        <button type="submit">Add</button>
    </form>

    <p id="message"></p>

    <h2>Student List</h2>
    <ul>
        {% for student in students %}
            <li>{{ student.study_hours }} - {{ student.sleep_hours }} : {{ student.prediction }}</li>
        {% endfor %}
    </ul>

    <script>
        // Handle form submission via JavaScript (AJAX)
        document.getElementById('studentForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const study_hours = document.getElementById('study_hours').value;
            const sleep_hours = document.getElementById('sleep_hours').value;

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ study_hours, sleep_hours })
            });

            const data = await response.json();
            document.getElementById('message').textContent = data.message || data.error;

            // Reload the page if added successfully
            if (response.ok) {
                setTimeout(() => location.reload(), 1000);
            }
        });
    </script>
</body>
</html>
